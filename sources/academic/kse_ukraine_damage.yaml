    description: ロシアの軍事侵攻によるウクライナのインフラ破壊による被害の最新評価。住宅、交通、エネルギー、教育、医療等の分野別被害額を詳細分析
    tags:
      - infrastructure
      - damage_assessment
      - housing
      - transport
      - energy
      - healthcare
      - education
    url: https://kse.ua/russia-will-pay/
