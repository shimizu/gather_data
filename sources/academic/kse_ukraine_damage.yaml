source:
  id: kse_ukraine_damage
  name: KSE Institute - Russia Will Pay Project
  url: https://kse.ua/russia-will-pay/
  description: キーウ経済学院（KSE）研究所による包括的戦争被害評価プロジェクト。ロシアの軍事侵攻による民間インフラへの直接的損失を収集・評価・分析・文書化。ウクライナ大統領府、経済省等と連携してUSAIDの支援を受けて実施。
  provider: KSE Institute (Kyiv School of Economics)
  category: academic
  formats:
    - pdf
    - csv
    - json
