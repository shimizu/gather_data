source:
  id: asf_alaska
  name: Alaska Satellite Facility (ASF)
  url: https://asf.alaska.edu
  description: NASA DAACs（分散型アクティブアーカイブセンター）の一つ。SAR（合成開口レーダー）データの配信・処理サービスを提供
  provider: NASA/University of Alaska Fairbanks
  category: government
  formats:
    - geotiff
    - netcdf
    - hdf5
datasets:
