<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">Data Catalog</h1>
      <p class="header-desc">AIエージェントが収集したデータソースカタログ</p>
      <div class="stats" id="stats"></div>
    </div>
  </header>

  <main class="main">
    <div class="toolbar">
      <div class="search-box">
        <input type="search" id="search" placeholder="データセットを検索..." autocomplete="off">
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="government">Government</button>
        <button class="filter-btn" data-category="international">International</button>
        <button class="filter-btn" data-category="academic">Academic</button>
        <button class="filter-btn" data-category="private">Private</button>
      </div>
    </div>

    <div class="results-info" id="results-info"></div>
    <div class="grid" id="grid"></div>
  </main>

  <!-- 詳細モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="閉じる">&times;</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <footer class="footer">
    <p>Generated by <a href="https://github.com/anthropics/claude-code" target="_blank" rel="noopener">Claude Code</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
