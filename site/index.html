<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1 class="title">Data Catalog</h1>
    <div class="search-wrap">
      <input type="search" id="search" placeholder="名前、タグ、提供元で検索..." autocomplete="off" autofocus>
    </div>
    <nav class="filters" id="filters">
      <button class="filter active" data-category="all">すべて</button>
      <button class="filter" data-category="government"><span class="dot dot--gov"></span>政府</button>
      <button class="filter" data-category="international"><span class="dot dot--int"></span>国際機関</button>
      <button class="filter" data-category="academic"><span class="dot dot--aca"></span>学術</button>
      <button class="filter" data-category="private"><span class="dot dot--pri"></span>民間</button>
    </nav>
  </header>

  <main class="main" id="main">
    <div class="status" id="status"></div>
    <div class="listing" id="listing"></div>
  </main>

  <footer class="footer" id="footer"></footer>

  <script src="app.js"></script>
</body>
</html>
